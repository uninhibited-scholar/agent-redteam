# Example: Using agent-redteam as a GitHub Action
#
# This workflow:
# 1. Runs a security scan on every push/PR
# 2. Uploads SARIF results to GitHub Security tab
# 3. Comments the score on the PR (auto-updates on re-scan)
# 4. Fails CI if score < threshold

name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Required permissions for SARIF upload + PR comments
permissions:
  contents: read
  security-events: write   # SARIF upload
  pull-requests: write     # PR comments
  actions: read

jobs:
  redteam-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run agent-redteam scan
        id: scan
        uses: uninhibited-scholar/agent-redteam@v0.3.0
        with:
          model: gpt-4o
          target: openai
          api-key: ${{ secrets.OPENAI_API_KEY }}
          fail-below: "70"
          limit: "20"
          # SARIF upload + PR comment are on by default
          # upload-sarif: "true"
          # pr-comment: "true"

      - name: Show results in job summary
        if: always()
        run: |
          echo "## 🛡️ Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Score** | ${{ steps.scan.outputs.score }}/100 |" >> $GITHUB_STEP_SUMMARY
          echo "| **Samples** | ${{ steps.scan.outputs.total-samples }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Failed** | ${{ steps.scan.outputs.total-failed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Errors** | ${{ steps.scan.outputs.total-errors }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Run status** | ${{ steps.scan.outputs.run-status }} |" >> $GITHUB_STEP_SUMMARY

# ----------------------------------------------------------------------------
# What you get:
#
# 1. CI gate: PR fails if score < fail-below
# 2. PR comment: auto-posted score table + suite breakdown (updates on re-scan)
# 3. Security tab: SARIF results appear in GitHub's Security → Code Scanning
# 4. Job summary: score appears in the Actions run summary
