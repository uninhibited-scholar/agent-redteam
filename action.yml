name: "Agent Redteam Scan"
description: "AI agent security red-team scanner for CI — OWASP LLM Top 10 coverage, SARIF output, PR comments. Like `npm audit` for AI agents."

branding:
  icon: "shield"
  color: "blue"

inputs:
  model:
    description: "Model ID to test (e.g. gpt-4o, glm-4-plus, llama3)"
    required: true
  target:
    description: "Target: openai (default), claude, zai, ollama, deepseek, azure, qwen, local"
    required: false
    default: "openai"
  api-key:
    description: "API key (use secrets!). Not needed for ollama/local."
    required: false
    default: ""
  base-url:
    description: "Custom API base URL"
    required: false
    default: ""
  fail-below:
    description: "Fail CI if score below this (0-100, 0 = no gate)"
    required: false
    default: "0"
  suites:
    description: "Comma-separated suites (default: all 10)"
    required: false
    default: ""
  limit:
    description: "Max samples per suite (default: 20)"
    required: false
    default: "20"
  max-tokens:
    description: "Max response tokens (default: 500)"
    required: false
    default: "500"
  workers:
    description: "Parallel API calls (default: 4)"
    required: false
    default: "4"
  upload-sarif:
    description: "Upload SARIF to GitHub Security tab (default: true)"
    required: false
    default: "true"
  pr-comment:
    description: "Post results as PR comment (default: true)"
    required: false
    default: "true"

outputs:
  score:
    description: "Overall security score (0-100)"
    value: ${{ steps.scan.outputs.score }}
  total-samples:
    description: "Total samples tested"
    value: ${{ steps.scan.outputs.total-samples }}
  total-failed:
    description: "Total failed samples"
    value: ${{ steps.scan.outputs.total-failed }}
  sarif-file:
    description: "Path to SARIF file"
    value: ${{ steps.scan.outputs.sarif-file }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install agent-redteam
      shell: bash
      run: pip install agent-redteam

    - name: Run security scan
      id: scan
      shell: bash
      env:
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_TARGET: ${{ inputs.target }}
        INPUT_API_KEY: ${{ inputs.api-key }}
        INPUT_BASE_URL: ${{ inputs.base-url }}
        INPUT_FAIL_BELOW: ${{ inputs.fail-below }}
        INPUT_SUITES: ${{ inputs.suites }}
        INPUT_LIMIT: ${{ inputs.limit }}
        INPUT_MAX_TOKENS: ${{ inputs.max-tokens }}
        INPUT_WORKERS: ${{ inputs.workers }}
      run: |
        ARGS="--model $INPUT_MODEL --target $INPUT_TARGET --workers $INPUT_WORKERS --limit $INPUT_LIMIT --max-tokens $INPUT_MAX_TOKENS"
        [ -n "$INPUT_API_KEY" ] && ARGS="$ARGS --key $INPUT_API_KEY"
        [ -n "$INPUT_BASE_URL" ] && ARGS="$ARGS --base-url $INPUT_BASE_URL"
        [ -n "$INPUT_SUITES" ] && ARGS="$ARGS --suites $INPUT_SUITES"
        { [ "$INPUT_FAIL_BELOW" != "0" ] && [ -n "$INPUT_FAIL_BELOW" ]; } && ARGS="$ARGS --fail-below $INPUT_FAIL_BELOW"

        echo "🛡️ agent-redteam scan: $INPUT_MODEL ($INPUT_TARGET), $INPUT_LIMIT samples/suite"

        agent-redteam scan $ARGS --format json > /tmp/redteam-report.json 2>/tmp/redteam-stderr.log || SCAN_EXIT=$?
        agent-redteam scan $ARGS --format sarif > /tmp/redteam.sarif 2>/dev/null || true

        cat /tmp/redteam-stderr.log >&2

        python3 << 'PYEOF'
        import json
        raw = open('/tmp/redteam-report.json').read()
        start = raw.find('{')
        if start < 0:
            print('::error::No JSON output'); raise SystemExit(0)
        d = json.loads(raw[start:])
        score = d.get('overall_score', 0)
        total = d.get('total_samples', 0)
        failed = d.get('total_failed', 0)
        model = d.get('target_model', '?')
        print(f'::set-output name=score::{score}')
        print(f'::set-output name=total-samples::{total}')
        print(f'::set-output name=total-failed::{failed}')
        print(f'::set-output name=sarif-file::/tmp/redteam.sarif')
        suites = d.get('suites', [])
        lines = []
        for s in suites:
            icon = 'OK' if s['score'] >= 80 else ('WARN' if s['score'] >= 50 else 'FAIL')
            lines.append("| {} | {:.1f} | {}/{} | {} |".format(s['name'], s['score'], s['passed'], s['total'], icon))
        verdict = 'PASS' if score >= 80 else ('CAUTION' if score >= 50 else 'FAIL')
        comment = "## agent-redteam Security Scan\n\n| Metric | Value |\n|--------|-------|\n"
        comment += "| **Model** | {} |\n".format(model)
        comment += "| **Score** | **{}/100** |\n".format(score)
        comment += "| **Samples** | {} |\n".format(total)
        comment += "| **Failed** | {} |\n\n".format(failed)
        comment += "### Suite Breakdown\n\n| Suite | Score | Pass/Total | Status |\n|-------|-------|------------|--------|\n"
        comment += "\n".join(lines) + "\n\n"
        comment += "**{}** — Score {}/100\n".format(verdict, score)
        open('/tmp/redteam-comment.md', 'w').write(comment)
        print("\n  Score: {}/100 ({} failed)".format(score, failed))
        PYEOF

        if [ -n "$SCAN_EXIT" ] && [ "$SCAN_EXIT" -ne 0 ]; then
          echo "::error::Security score below threshold ($INPUT_FAIL_BELOW)"
          exit 1
        fi

    - name: Upload SARIF
      if: ${{ inputs.upload-sarif == 'true' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: /tmp/redteam.sarif
        category: agent-redteam

    - name: Comment on PR
      if: ${{ inputs.pr-comment == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          let body;
          try { body = fs.readFileSync('/tmp/redteam-comment.md', 'utf8'); }
          catch { return; }
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner, repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const marker = '## agent-redteam Security Scan';
          const existing = comments.find(c => c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: existing.id, body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body,
            });
          }
